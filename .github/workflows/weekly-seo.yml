name: Weekly SEO report

on:
  schedule:
    - cron: "15 8 * * 1" # Monday 08:15 UTC
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger weekly SEO report
        run: |
          curl -sf -X POST "https://servolia.com/api/cron/weekly-seo" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
