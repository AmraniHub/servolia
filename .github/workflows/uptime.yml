name: Uptime monitor

# Independent of Vercel — if the site is down, this still runs and alerts.
# Needs GitHub repo secrets TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID
# (same values as the Vercel env vars).

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check homepage and system health
        id: check
        run: |
          FAIL=""
          HOME_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 25 https://servolia.com/ || echo "000")
          [ "$HOME_CODE" != "200" ] && FAIL="homepage HTTP $HOME_CODE"
          HEALTH=$(curl -s --max-time 25 https://servolia.com/api/health || echo "")
          echo "$HEALTH" | grep -q '"ok":true' || FAIL="${FAIL:+$FAIL · }health check failed"
          if [ -n "$FAIL" ]; then
            echo "fail=$FAIL" >> "$GITHUB_OUTPUT"
            echo "Servolia DOWN: $FAIL"
            exit 1
          fi
          echo "All checks passed."

      - name: Telegram alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="🔴 SERVOLIA DOWN — ${{ steps.check.outputs.fail }} (uptime monitor, $(date -u '+%H:%M UTC'))" \
            > /dev/null || true
